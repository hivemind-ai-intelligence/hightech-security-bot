version: "3.9"

services:
  bot:
    build: .
    container_name: hightech-security-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  webhook:
    build: .
    container_name: hightech-security-webhook
    restart: unless-stopped
    command: python webhook_server.py
    env_file:
      - .env
    ports:
      - "${WEBHOOK_PORT:-8080}:8080"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
