services:
  - type: web
    name: hightech-security-bot
    env: python
    region: singapore
    plan: free
    buildCommand: |
      apt-get update -qq
      apt-get install -y -qq ffmpeg libsodium-dev 2>/dev/null || true
      pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: BOT_PREFIX
        value: "!"
      - key: LOG_LEVEL
        value: INFO
    autoDeploy: true
