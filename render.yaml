services:
  - type: web
    name: hightech-security-bot
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: BOT_PREFIX
        value: "!"
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: "8080"
